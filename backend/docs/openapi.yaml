paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, example: Alex Doe }
                email: { type: string, example: alex@example.com }
                password: { type: string, example: Strong@123 }
      responses:
        '201':
          description: User registered
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, example: alex@example.com }
                password: { type: string, example: Strong@123 }
      responses:
        '200':
          description: Login successful
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile

  /api/v1/tasks:
    get:
      tags: [Tasks]
      summary: List my tasks
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [todo, in_progress, done] }
        - in: query
          name: priority
          schema: { type: string, enum: [low, medium, high] }
      responses:
        '200':
          description: Task list
    post:
      tags: [Tasks]
      summary: Create task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
                status: { type: string, enum: [todo, in_progress, done] }
                priority: { type: string, enum: [low, medium, high] }
                dueDate: { type: string, format: date-time }
      responses:
        '201':
          description: Task created

  /api/v1/tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: Get one task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: taskId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Task found }
    patch:
      tags: [Tasks]
      summary: Update task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: taskId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Task updated }
    delete:
      tags: [Tasks]
      summary: Delete task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: taskId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Task deleted }

  /api/v1/tasks/admin/all:
    get:
      tags: [Tasks]
      summary: Admin can list all tasks
      security:
        - bearerAuth: []
      responses:
        '200': { description: All tasks list }
